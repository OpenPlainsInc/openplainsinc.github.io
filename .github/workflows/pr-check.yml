name: Quarto PR Check

on:
  pull_request:
    branches:
      - main

# Deny-all by default; grant the minimum each job needs.
permissions: {}

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache apt packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/apt.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies (GIS stack)
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y wget git gawk findutils software-properties-common
          LC_ALL=C.UTF-8 sudo add-apt-repository -y ppa:ubuntugis/ubuntugis-unstable
          sudo apt-get update -y
          xargs -a <(awk '! /^ *(#|$)/' ".github/workflows/apt.txt") -r -- \
              sudo apt-get install -y --no-install-recommends --no-install-suggests

      - name: Verify GRASS and PDAL
        run: |
          grass --version
          pdal --version

      - name: Set up Python (match publish)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Install the project (match publish)
        run: uv sync --locked --all-extras --dev

      - name: Add venv to PATH
        run: echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      - name: Set up Quarto (match publish)
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          version: "1.9.35" # Specify the desired version

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0

      - name: Check if rendering succeeded
        run: |
          if [ ! -d "docs" ]; then
            echo "Rendering failed: docs folder does not exist."
            exit 1
          fi

      - name: Upload rendered site as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rendered-site
          path: docs/
