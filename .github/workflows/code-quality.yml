name: Code Quality

# Enforces the same checks as the local pre-commit hooks (ruff lint + format,
# actionlint, gitleaks, file hygiene) on every PR, so quality gates apply even
# when a contributor has not run `pre-commit` locally.
#
# Note: this is a content/docs repo with no test suite, so there is no code
# coverage to measure. This workflow is the meaningful "code quality" gate.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Deny-all by default; grant the minimum the job needs.
permissions: {}

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"

      - name: Cache pre-commit environments
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit hooks
        run: uvx pre-commit@4.6.0 run --all-files --show-diff-on-failure
