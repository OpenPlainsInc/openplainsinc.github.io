name: Code Quality

# Enforces the same checks as the local pre-commit hooks (ruff lint + format,
# actionlint, gitleaks, file hygiene) on every PR, so quality gates apply even
# when a contributor has not run `pre-commit` locally.
#
# Note: this is a content/docs repo with no test suite, so there is no code
# coverage to measure. This workflow is the meaningful "code quality" gate.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Deny-all by default; grant the minimum the job needs.
permissions: {}

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit hooks
        run: uvx pre-commit@4.6.0 run --all-files --show-diff-on-failure

  colab-badges:
    # Colab badges point at repo paths on GitHub; fail if a referenced
    # notebook is not committed (the badge would 404 in Colab).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check Colab badge targets exist
        run: |
          status=0
          grep -rHoE 'https://colab\.research\.google\.com/github/OpenPlainsInc/openplainsinc\.github\.io/blob/main/[^)" ]+' \
            --include='*.qmd' --include='*.ipynb' --exclude-dir=templates content/ | sort -u | \
          while IFS=: read -r file url; do
            path="${url#*blob/main/}"
            if [ ! -f "$path" ]; then
              echo "::error file=${file}::Colab badge target missing from repo: ${path}"
              echo "MISSING" >> /tmp/colab-missing
            fi
          done
          if [ -f /tmp/colab-missing ]; then
            status=1
          fi
          exit "$status"
